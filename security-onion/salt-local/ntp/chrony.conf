# NTP server list
{%- for SERVER in NTPCONFIG.servers %}
server {{ SERVER }} iburst maxpoll 10
{%- endfor %}

# Config options
driftfile /var/lib/chrony/drift
# makestep limit -1 (was 3): allow chronyd to STEP the clock at ANY update when the
# offset exceeds 1s, so the guest clock auto-resyncs after a QEMU pause/resume instead
# of trying to slew a multi-hour gap forever. SO-local override of
# default/salt/ntp/chrony.conf (file_roots: local wins; survives soup/highstate). 2026-06-13
makestep 1.0 -1
rtcsync
logdir /var/log/chrony
port 0
cmdport 0
